<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance - Glassmorphism Header</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
   



<section class="registration-section">
  <div class="flip-card" id="authCard">
    <div class="flip-card-inner">
      
      <!-- FRONT SIDE: Registration (Join the Class) -->
      <div class="flip-card-front">
        <div class="side-gradient">
          <h2>Returning Dancer?</h2>
          <p>Log in to track your recital participation and dress codes.</p>
          <button class="btn-outline" onclick="flipCard()">SIGN IN</button>
        </div>
        <div class="side-glass">
          <h3>Join the Class</h3>
          <form class="glass-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <select class="glass-select">
              <option value="" disabled selected>Select Genre</option>
              <option value="ballet">Ballet</option>
              <option value="jazz">Jazz</option>
              <option value="tap">Tap</option>
            </select>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-pink">REGISTER</button>
          </form>
        </div>
      </div>

      <!-- BACK SIDE: Sign In Form -->
      <div class="flip-card-back">
        <div class="side-glass">
          <h3>Sign In</h3>
          <form class="glass-form">
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-pink">LOG IN</button>
          </form>
        </div>
        <div class="side-gradient">
          <h2>New Here?</h2>
          <p>Register today to join our community and start dancing!</p>
          <button class="btn-outline" onclick="flipCard()">REGISTER</button>
        </div>
      </div>

    </div>
  </div>
</section>



    <script src="script.js"></script>
</body>
</html>
